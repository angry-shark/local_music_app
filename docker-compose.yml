version: '3.8'

services:
  # QQ音乐API服务
  qq-music-api:
    build:
      context: ./qq-music-api
      dockerfile: Dockerfile
    container_name: music-app-qq-music-api
    restart: unless-stopped
    ports:
      - "3300:3300"
    environment:
      - NODE_ENV=production
      - PORT=3300
      # 可选：配置默认 QQ 音乐 Cookie（从浏览器复制）
      # 如果不配置，可以通过前端设置 Cookie
      # - QQ_MUSIC_COOKIE=uin=123456;qqmusic_key=xxx;...
    networks:
      - music-app-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: music-app-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - QQ_MUSIC_API_URL=http://qq-music-api:3300
    volumes:
      - ./backend/prisma:/app/prisma
      - ./backend/uploads:/app/uploads
    depends_on:
      - qq-music-api
    networks:
      - music-app-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: music-app-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - music-app-network

networks:
  music-app-network:
    driver: bridge
